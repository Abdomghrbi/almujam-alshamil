<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">المعجم الشامل — صورة مشاركة</title>
  <desc id="desc">بطاقة مشاركة لمشروع المعجم الشامل تعرض اسم المشروع ووصفًا مختصرًا على خلفية متدرجة.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="55%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1040" cy="110" r="110" fill="#ffffff" fill-opacity="0.14" />
  <circle cx="150" cy="520" r="140" fill="#ffffff" fill-opacity="0.10" />
  <circle cx="980" cy="520" r="220" fill="#ffffff" fill-opacity="0.06" />

  <rect x="90" y="80" width="1020" height="470" rx="42" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" filter="url(#shadow)" />

  <g transform="translate(150 170)">
    <rect x="0" y="0" width="110" height="110" rx="28" fill="#ffffff" fill-opacity="0.18" />
    <path d="M28 33h54a6 6 0 0 1 6 6v42a6 6 0 0 1-6 6H28a6 6 0 0 1-6-6V39a6 6 0 0 1 6-6Zm0 0v48" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M56 38v54" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.88" />
  </g>

  <g fill="#fff" font-family="Arial, 'Noto Naskh Arabic', 'Noto Sans Arabic', sans-serif" direction="rtl" text-anchor="start">
    <text x="980" y="215" font-size="34" opacity="0.92">مشروع مفتوح المصدر</text>
    <text x="980" y="300" font-size="72" font-weight="700">المعجم الشامل</text>
    <text x="980" y="360" font-size="28" opacity="0.90">موسوعة عربية للكلمات واللهجات والمعاني والجذور</text>
    <text x="980" y="410" font-size="24" opacity="0.84">• تسجيلات صوتية • مساهمات مجتمعية • إشراف ومراجعة</text>
    <text x="980" y="470" font-size="22" opacity="0.82">Arabic dictionary and dialects project</text>
  </g>

  <g transform="translate(170 380)">
    <rect x="0" y="0" width="300" height="70" rx="20" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="24" y="44" fill="#fff" font-size="22" font-family="Arial, 'Noto Sans Arabic', sans-serif">كلمات • لهجات • نطق أصلي</text>
  </g>
</svg>
